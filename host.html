<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>结算中 — 德州结算</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div class="page-header">
        <div class="logo-icon">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="18" stroke="white" stroke-width="2.5"/>
                <circle cx="20" cy="20" r="12" stroke="white" stroke-width="2"/>
                <line x1="20" y1="2" x2="20" y2="38" stroke="white" stroke-width="2"/>
                <line x1="2" y1="20" x2="38" y2="20" stroke="white" stroke-width="2"/>
                <circle cx="20" cy="20" r="3" fill="white"/>
            </svg>
        </div>
        <h1>结算中</h1>
        <span class="room-pill" id="room-pill">----</span>
    </div>

    <div class="card">
        <div class="progress-label" id="progress-text">已提交 0 / 0 玩家</div>
        <div class="progress-wrap">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">玩家状态</div>
        <div class="player-list" id="player-cards"></div>
    </div>

    <button class="btn btn-gold" id="btn-finalize" disabled style="margin-bottom:10px">
        确认结算
    </button>
    <button class="btn btn-danger btn-sm" id="btn-reset">重置游戏</button>

    <!-- Results section -->
    <div id="results-section" class="hidden" style="margin-top:16px">
        <div class="card slide-up">
            <div class="card-title">🎉 最终结果</div>
            <table class="results-table">
                <thead>
                    <tr>
                        <th></th>
                        <th>玩家</th>
                        <th>持筹</th>
                        <th>投入</th>
                        <th>盈亏</th>
                    </tr>
                </thead>
                <tbody id="results-tbody"></tbody>
            </table>
            <div id="balance-badge"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/avatars.js"></script>
<script src="js/settlement.js"></script>
<script src="js/host.js"></script>
</body>
</html>
