<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>输入筹码 — 德州结算</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div class="page-header">
        <div id="my-avatar" class="avatar-circle" style="background:#e8e8e4"></div>
        <span id="my-name" style="font-size:17px;font-weight:600;flex:1">加载中...</span>
        <span class="room-pill" id="room-pill">----</span>
    </div>

    <!-- Phase: waiting -->
    <div id="phase-waiting">
        <div class="card">
            <div class="spinner-wrap">
                <div class="spinner"></div>
                <p class="spinner-text">等待庄家开始结算...</p>
            </div>
        </div>
        <div class="card">
            <div class="card-title">当前玩家</div>
            <div class="player-list" id="waiting-player-list"></div>
        </div>
    </div>

    <!-- Phase: settling -->
    <div id="phase-settling" class="hidden">
        <div class="pnl-card" id="pnl-card">
            <div class="pnl-rows">
                <div class="pnl-row-item">
                    <div class="label">持筹</div>
                    <div class="value" id="pnl-chip-total">0</div>
                </div>
                <div class="pnl-row-item">
                    <div class="label">投入</div>
                    <div class="value" id="pnl-invested">1000</div>
                </div>
            </div>
            <div class="pnl-amount neutral" id="pnl-value">0</div>
            <div class="pnl-label">盈亏（分）</div>
        </div>

        <div class="card">
            <div class="card-title">清点筹码</div>
            <div class="stepper-rows">
                <div class="stepper-row">
                    <div class="chip-dot c100">100</div>
                    <div class="stepper-label">100 分筹码</div>
                    <div class="stepper-ctrl">
                        <button class="stepper-btn" id="btn-minus-n100">−</button>
                        <span class="stepper-count" id="count-n100">0</span>
                        <button class="stepper-btn" id="btn-plus-n100">＋</button>
                    </div>
                </div>
                <div class="stepper-row">
                    <div class="chip-dot c50">50</div>
                    <div class="stepper-label">50 分筹码</div>
                    <div class="stepper-ctrl">
                        <button class="stepper-btn" id="btn-minus-n50">−</button>
                        <span class="stepper-count" id="count-n50">0</span>
                        <button class="stepper-btn" id="btn-plus-n50">＋</button>
                    </div>
                </div>
                <div class="stepper-row">
                    <div class="chip-dot c20">20</div>
                    <div class="stepper-label">20 分筹码</div>
                    <div class="stepper-ctrl">
                        <button class="stepper-btn" id="btn-minus-n20">−</button>
                        <span class="stepper-count" id="count-n20">0</span>
                        <button class="stepper-btn" id="btn-plus-n20">＋</button>
                    </div>
                </div>
                <div class="stepper-row">
                    <div class="chip-dot c10">10</div>
                    <div class="stepper-label">10 分筹码</div>
                    <div class="stepper-ctrl">
                        <button class="stepper-btn" id="btn-minus-n10">−</button>
                        <span class="stepper-count" id="count-n10">0</span>
                        <button class="stepper-btn" id="btn-plus-n10">＋</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">借底</div>
            <div class="stepper-row" style="background:var(--gold-light)">
                <div class="chip-dot" style="background:var(--gold);font-size:9px">底</div>
                <div class="stepper-label">
                    借底次数
                    <span>每借一底 = 额外1000分投入</span>
                </div>
                <div class="stepper-ctrl">
                    <button class="stepper-btn" id="btn-minus-buyIns">−</button>
                    <span class="stepper-count" id="count-buyIns">0</span>
                    <button class="stepper-btn" id="btn-plus-buyIns">＋</button>
                </div>
            </div>
        </div>

        <div id="submit-section">
            <button class="btn btn-primary" id="btn-submit" disabled>提交结算</button>
        </div>
        <div class="progress-text" id="progress-text" style="margin-top:10px"></div>
    </div>

    <!-- Phase: results -->
    <div id="phase-results" class="hidden">
        <div class="card fade-in">
            <div class="card-title">🎉 结算结果</div>
            <table class="results-table">
                <thead>
                    <tr>
                        <th></th>
                        <th>玩家</th>
                        <th>持筹</th>
                        <th>投入</th>
                        <th>盈亏</th>
                    </tr>
                </thead>
                <tbody id="results-tbody"></tbody>
            </table>
            <div id="balance-badge"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/avatars.js"></script>
<script src="js/settlement.js"></script>
<script src="js/player.js"></script>
</body>
</html>
