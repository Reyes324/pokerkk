<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>德州结算</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div class="hero">
        <div class="hero-icon">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="18" stroke="white" stroke-width="2.5"/>
                <circle cx="20" cy="20" r="12" stroke="white" stroke-width="2"/>
                <line x1="20" y1="2" x2="20" y2="38" stroke="white" stroke-width="2"/>
                <line x1="2" y1="20" x2="38" y2="20" stroke="white" stroke-width="2"/>
                <circle cx="20" cy="20" r="3" fill="white"/>
            </svg>
        </div>
        <h1>德州结算</h1>
        <p>快速清点筹码，智能对账</p>
    </div>

    <div class="card">
        <div class="card-title">你的信息</div>
        <div class="input-group">
            <label class="input-label" for="name-input">昵称</label>
            <input type="text" id="name-input" class="input-field" placeholder="你的昵称" maxlength="10" autocomplete="off">
        </div>
        <div class="input-group" style="margin-bottom:0">
            <label class="input-label">选择头像</label>
            <div class="avatar-grid" id="avatar-grid"></div>
        </div>
    </div>

    <div class="btn-row">
        <button class="btn btn-primary" id="btn-create">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            创建游戏
        </button>
        <button class="btn btn-secondary" id="btn-join-toggle">
            加入游戏
        </button>
    </div>

    <div class="join-section" id="join-section">
        <div class="card" style="margin-bottom:12px">
            <div class="card-title">输入房间码</div>
            <div class="input-group" style="margin-bottom:12px">
                <input type="text" id="room-code-input" class="input-field code-input"
                    placeholder="ABCD" maxlength="4" autocomplete="off" autocapitalize="characters">
            </div>
            <button class="btn btn-primary" id="btn-join-confirm">确认加入</button>
        </div>
    </div>

    <div class="card" style="margin-top:4px">
        <div class="card-title">游戏规则</div>
        <div class="info-chips">
            <span class="info-chip">1底 = 1000分</span>
            <span class="info-chip">🔴 100 × 5</span>
            <span class="info-chip">🟡 50 × 5</span>
            <span class="info-chip">🔵 20 × 10</span>
            <span class="info-chip">⚪ 10 × 5</span>
        </div>
        <p style="font-size:13px;color:var(--gray-400);line-height:1.6">输光可以借底，每借一底追加1000分投入。结算时清点筹码数量，系统自动计算盈亏。</p>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/avatars.js"></script>
<script src="js/settlement.js"></script>
<script src="js/index.js"></script>
</body>
</html>
