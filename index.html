<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>猫店德州结算</title>
    <link rel="icon" type="image/png" href="img/paw.png">
    <link rel="apple-touch-icon" href="img/paw.png">
    <link rel="stylesheet" href="css/style.css?v=73">
</head>
<body>
<div class="container" id="main-view">

    <!-- Header -->
    <div class="app-header">
        <div class="app-title">
            <div class="app-title-icon">
                <img src="img/paw.png?v=6" alt="猫爪">
            </div>
            <div>
                <div class="app-title-text">猫店德州结算</div>
            </div>
        </div>
        <div id="conn-indicator" class="conn-indicator hidden">重连中…</div>
        <div class="header-actions">
            <div class="btn-icon-wrap">
                <button class="btn-icon btn-icon-text" id="btn-open-records" title="对局记录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="9"/>
                        <polyline points="12 7 12 12 15 14"/>
                    </svg>
                    <span>记录</span>
                </button>
                <span class="round-badge hidden" id="rounds-badge">0</span>
            </div>
            <button class="btn-icon btn-icon-reset" id="btn-reset-soft" title="重置">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                    <path d="M21 3v5h-5"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Player list -->
    <div id="player-list"></div>

    <!-- Add player -->
    <button class="btn-add-player" id="btn-add-player">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        添加玩家
    </button>

    <!-- Long-press hint -->
    <p class="hint-text">左滑或长按玩家卡片可删除</p>

    <!-- Bottom spacer so content isn't hidden behind floating bar -->
    <div style="height:88px"></div>

</div>

<!-- ── 牌诀视图 ── -->
<div id="paijue-view" class="paijue-view hidden">
  <div class="pj-header">
    <span class="pj-header-title">牌诀</span>
  </div>
  <div class="pj-scene">
    <!-- 签+筒贴合主体 -->
    <div class="pj-oracle">
      <!-- 签条：从签筒里滑出 -->
      <div class="pj-slip" id="pj-slip">
        <div class="pj-slip-deco"></div>
        <p class="pj-slip-text" id="pj-slip-text"></p>
        <div class="pj-slip-deco"></div>
      </div>
      <!-- 签筒 PNG（签+筒合体） -->
      <div class="pj-cylinder-group" id="pj-cylinder-wrap">
        <img class="pj-cylinder-img" src="img/qiantong.png" alt="签筒">
      </div>
    </div>

    <!-- 按钮在签筒下方 -->
    <button class="pj-btn-redraw hidden" id="btn-pj-redraw">再来一签</button>
  </div>
</div>

<!-- ── Floating bottom bar ── -->
<div class="float-bar" id="float-bar">
    <div class="float-bar-inner">
        <div class="float-bar-pnl">
            <span class="float-bar-label">总盈亏</span>
            <span class="float-bar-value" id="total-pnl">— 分</span>
            <span class="balance-tag hidden" id="balance-tag"></span>
        </div>
        <div class="float-bar-btns">
            <button class="btn-end-round" id="btn-end-round" disabled>结束本局</button>
            <button class="btn-export-icon" id="btn-export" disabled title="导出结果">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
            </button>
        </div>
    </div>
</div>


<!-- ── Chip input half-sheet ── -->
<div id="chip-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="chip-modal-header" id="chip-modal-header">
            <!-- avatar + name rendered by JS -->
        </div>
        <div id="chip-modal-body">
            <!-- steppers rendered by JS -->
        </div>
        <button class="btn btn-primary" id="btn-chip-done">完成</button>
    </div>
</div>

<!-- ── Avatar picker half-sheet ── -->
<div id="avatar-modal" class="modal-overlay hidden">
    <div class="modal-sheet avatar-modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div style="display:flex;align-items:center;gap:8px">
                <span>选择头像</span>
                <span class="editing-tag hidden" id="avatar-modal-editing-tag">有人录入中</span>
            </div>
            <button class="btn-icon" id="btn-close-modal" aria-label="关闭">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="avatar-grid" id="modal-avatar-grid"></div>
    </div>
</div>

<!-- ── Name edit half-sheet ── -->
<div id="name-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div style="display:flex;align-items:center;gap:8px">
                <span>编辑名字</span>
                <span class="editing-tag hidden" id="name-modal-editing-tag">有人录入中</span>
            </div>
            <button class="btn-icon" id="btn-close-name-modal" aria-label="关闭">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <input type="text" id="name-modal-input" class="input-field" maxlength="10" autocomplete="off" style="margin-bottom:14px">
        <button class="btn btn-primary" id="btn-save-name">保存</button>
    </div>
</div>

<!-- ── Delete confirm half-sheet ── -->
<div id="delete-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <p id="delete-modal-text" style="font-size:16px;font-weight:500;color:var(--ink-1);margin-bottom:6px;text-align:center"></p>
        <p id="delete-modal-sub" style="font-size:13px;color:var(--ink-3);margin-bottom:20px;text-align:center">该玩家的筹码数据将被清除</p>
        <button class="btn btn-danger" id="btn-delete-confirm" style="margin-bottom:8px">确认删除</button>
        <button class="btn btn-ghost" id="btn-delete-cancel">取消</button>
    </div>
</div>

<!-- ── Reset confirm half-sheet ── -->
<div id="reset-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header"><span>重置游戏</span></div>
        <button class="btn btn-secondary" id="btn-reset-soft-confirm" style="margin-bottom:8px">重置筹码（保留名字和头像）</button>
        <button class="btn btn-danger" id="btn-reset-hard" style="margin-bottom:8px">完全重置（清空所有数据和记录）</button>
        <button class="btn btn-ghost" id="btn-cancel-reset">取消</button>
    </div>
</div>

<!-- ── Avatar action sheet ── -->
<div id="avatar-action-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <button class="btn btn-secondary" id="btn-avatar-reupload" style="margin-bottom:8px">重新上传照片</button>
        <button class="btn btn-danger" id="btn-avatar-delete" style="margin-bottom:8px">删除照片</button>
        <button class="btn btn-ghost" id="btn-avatar-action-cancel">取消</button>
    </div>
</div>

<!-- ── Aggregation action sheet（⋯ 菜单：释放/删除） ── -->
<div id="agg-action-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <button class="btn btn-secondary" id="btn-agg-release" style="margin-bottom:8px;flex-direction:column;height:auto;padding:10px">
            <span>释放汇总</span>
            <span style="font-size:12px;color:var(--ink-3);font-weight:400">退回对局，可重新选择</span>
        </button>
        <button class="btn btn-danger" id="btn-agg-delete" style="margin-bottom:8px">删除汇总</button>
        <button class="btn btn-ghost" id="btn-agg-action-cancel">取消</button>
    </div>
</div>

<!-- ── Round action sheet（⋯ 菜单：删除） ── -->
<div id="round-action-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <button class="btn btn-danger" id="btn-round-delete" style="margin-bottom:8px">删除对局</button>
        <button class="btn btn-ghost" id="btn-round-action-cancel">取消</button>
    </div>
</div>

<!-- Off-screen card for html2canvas capture (never visible to user) -->
<div id="export-capture-zone" aria-hidden="true">
    <div id="export-card">
        <div class="export-card-header">
            <div class="export-card-headline">本局结算</div>
            <div class="export-card-sub">
                <img src="img/paw.png" alt="" class="export-paw-sm">
                猫店德州&ensp;·&ensp;<span id="export-date"></span>
            </div>
        </div>
        <div id="export-table-wrap"></div>
        <div id="export-badge"></div>
    </div>
    <div id="agg-export-card">
        <div class="aggx-header">
            <div class="aggx-eyebrow" id="aggx-eyebrow">汇总成绩单</div>
        </div>
        <div class="aggx-list" id="aggx-list"></div>
        <div class="aggx-footer" id="aggx-footer"></div>
    </div>
</div>

<!-- ── Export modal ── -->
<div id="export-modal" class="modal-overlay hidden">
    <div class="modal-sheet export-modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <span>长按保存到本地</span>
            <button class="btn-icon" id="btn-close-export" aria-label="关闭">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="export-modal-body">
            <img id="export-image" style="width:100%;border-radius:12px;display:block" alt="结算结果">
        </div>
        <div class="export-modal-footer">
            <button class="btn btn-primary" id="btn-confirm-archive" style="margin-bottom:8px">确认存档</button>
            <button class="btn btn-ghost" id="btn-cancel-export">取消</button>
        </div>
    </div>
</div>

<!-- ── End-round confirm half-sheet ── -->
<div id="end-round-modal" class="modal-overlay hidden">
    <div class="modal-sheet has-scroll-body">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <span>结束本局</span>
            <button class="btn-icon" id="btn-close-end-round" aria-label="关闭">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div id="end-round-modal-body" class="modal-scroll-body"></div>
        <div class="modal-footer">
            <button class="btn btn-primary" id="btn-confirm-end-round" style="margin-bottom:8px">确认存档</button>
            <button class="btn btn-ghost" id="btn-cancel-end-round">取消</button>
        </div>
    </div>
</div>

<!-- ── Records full-screen page ── -->
<div id="records-page" class="modal-overlay push hidden">
    <div class="modal-sheet full">
        <div class="records-header">
            <button class="btn-icon" id="btn-close-records" aria-label="返回">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
            <span class="records-header-title">记录</span>
            <button class="btn-nav-text" id="btn-records-select">选择</button>
        </div>
        <div class="seg-control">
            <button class="seg-control-btn active" id="seg-rounds" onclick="switchRecordsTab('rounds')">对局</button>
            <button class="seg-control-btn" id="seg-agg" onclick="switchRecordsTab('aggregations')">汇总</button>
        </div>
        <div class="records-content" id="records-content"></div>
        <div class="records-action-bar hidden" id="records-action-bar">
            <button class="btn btn-primary" id="btn-do-aggregate" disabled>汇总</button>
        </div>
    </div>
</div>

<!-- ── Round detail half-sheet ── -->
<div id="round-detail-modal" class="modal-overlay hidden">
    <div class="modal-sheet has-scroll-body">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div>
                <div id="round-detail-title" style="font-size:16px;font-weight:500"></div>
                <div id="round-detail-time" style="font-size:12px;color:var(--ink-3);margin-top:2px;font-weight:400"></div>
            </div>
            <div style="display:flex;gap:2px">
                <button class="btn-icon" id="btn-round-more" aria-label="更多">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                </button>
                <button class="btn-icon" id="btn-close-round-detail" aria-label="关闭">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
        </div>
        <div id="round-detail-body" class="modal-scroll-body"></div>
    </div>
</div>

<!-- ── Aggregation result half-sheet ── -->
<div id="summary-result-modal" class="modal-overlay hidden">
    <div class="modal-sheet has-scroll-body">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div>
                <div style="font-size:16px;font-weight:500">汇总预览</div>
                <div id="summary-result-info" style="font-size:12px;color:var(--ink-3);margin-top:2px;font-weight:400"></div>
            </div>
            <button class="btn-icon" id="btn-close-summary-result" aria-label="关闭">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div id="summary-result-body" class="modal-scroll-body"></div>
        <div class="modal-footer">
            <button class="btn btn-primary" id="btn-save-aggregation">保存汇总记录</button>
        </div>
    </div>
</div>

<!-- ── Aggregation detail half-sheet ── -->
<div id="agg-detail-modal" class="modal-overlay hidden">
    <div class="modal-sheet has-scroll-body">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div>
                <div id="agg-detail-title" style="font-size:16px;font-weight:500"></div>
                <div id="agg-detail-subtitle" style="font-size:12px;color:var(--ink-3);margin-top:2px;font-weight:400"></div>
            </div>
            <div style="display:flex;gap:2px">
                <button class="btn-icon" id="btn-agg-more" aria-label="更多">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                </button>
                <button class="btn-icon" id="btn-close-agg-detail" aria-label="关闭">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
        </div>
        <div id="agg-detail-body" class="modal-scroll-body"></div>
    </div>
</div>

<input type="file" id="avatar-upload-input" accept="image/*" style="display:none" aria-hidden="true">
<div class="toast" id="toast"></div>

<!-- ── 底部导航 ── -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="bottom-nav-tab active" data-tab="settle" onclick="switchMainTab('settle')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
    </svg>
    <span>结算</span>
  </button>
  <button class="bottom-nav-tab" data-tab="paijue" onclick="switchMainTab('paijue')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 7h6M9 12h6M9 17h4"/>
    </svg>
    <span>牌诀</span>
  </button>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="js/firebase-app-compat.min.js"></script>
<script src="js/firebase-database-compat.min.js"></script>
<script src="js/firebase-config.js?v=22"></script>
<script src="js/avatars.js?v=22"></script>
<script src="js/settlement.js?v=22"></script>
<script src="js/night-titles.js?v=22"></script>
<script src="js/cards.js?v=1"></script>
<script src="js/app.js?v=53"></script>
</body>
</html>
