<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>德州结算</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="app-header">
        <div class="app-title">
            <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="18" stroke="#1B4332" stroke-width="2.5"/>
                <circle cx="20" cy="20" r="11" stroke="#1B4332" stroke-width="2"/>
                <line x1="20" y1="2" x2="20" y2="38" stroke="#1B4332" stroke-width="2"/>
                <line x1="2" y1="20" x2="38" y2="20" stroke="#1B4332" stroke-width="2"/>
                <circle cx="20" cy="20" r="3" fill="#1B4332"/>
            </svg>
            <span>德州结算</span>
        </div>
        <div class="header-actions">
            <button class="btn-icon" id="btn-reset-soft" title="重置筹码">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Status bar -->
    <div id="status-bar" class="status-bar hidden"></div>

    <!-- Player list -->
    <div id="player-list"></div>

    <!-- Add player -->
    <button class="btn-add-player" id="btn-add-player">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        添加玩家
    </button>

    <!-- Summary -->
    <div id="summary-bar" class="summary-bar hidden">
        <div class="summary-item">
            <span class="summary-label">总盈亏</span>
            <span class="summary-value" id="total-pnl">0</span>
        </div>
        <div id="balance-indicator" class="balance-ok">持平 ✓</div>
    </div>

    <!-- Confirm -->
    <button class="btn btn-primary" id="btn-confirm" style="margin-bottom:10px">确认结算</button>

    <!-- Results -->
    <div id="results-section" class="hidden"></div>

</div>

<!-- Avatar picker modal -->
<div id="avatar-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-header">
            <span>选择头像</span>
            <button class="btn-icon" id="btn-close-modal">✕</button>
        </div>
        <div class="avatar-grid" id="modal-avatar-grid"></div>
    </div>
</div>

<!-- Name edit modal -->
<div id="name-modal" class="modal-overlay hidden">
    <div class="modal-sheet" style="padding-bottom: calc(20px + env(safe-area-inset-bottom))">
        <div class="modal-header">
            <span>编辑名字</span>
            <button class="btn-icon" id="btn-close-name-modal">✕</button>
        </div>
        <input type="text" id="name-modal-input" class="input-field" maxlength="10" autocomplete="off" style="margin-bottom:14px">
        <button class="btn btn-primary" id="btn-save-name">保存</button>
    </div>
</div>

<!-- Reset confirm modal -->
<div id="reset-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-header"><span>重置游戏</span></div>
        <p style="color:var(--gray-700);font-size:15px;margin-bottom:20px;line-height:1.6">选择重置方式：</p>
        <button class="btn btn-secondary" id="btn-reset-soft-confirm" style="margin-bottom:10px">
            重置筹码（保留名字和头像）
        </button>
        <button class="btn btn-danger" id="btn-reset-hard" style="margin-bottom:14px">
            完全重置（清空所有数据）
        </button>
        <button class="btn btn-secondary btn-sm" id="btn-cancel-reset">取消</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/avatars.js"></script>
<script src="js/settlement.js"></script>
<script src="js/app.js"></script>
</body>
</html>
