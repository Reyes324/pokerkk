<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>猫店德州结算</title>
    <link rel="icon" type="image/png" href="img/paw.png">
    <link rel="apple-touch-icon" href="img/paw.png">
    <link rel="stylesheet" href="css/style.css?v=18">
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="app-header">
        <div class="app-title">
            <div class="app-title-icon">
                <img src="img/paw.png?v=6" alt="猫爪">
            </div>
            <div>
                <div class="app-title-text">猫店德州结算</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-icon" id="btn-reset-soft" title="重置">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"/>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Player list -->
    <div id="player-list"></div>

    <!-- Add player -->
    <button class="btn-add-player" id="btn-add-player">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        添加玩家
    </button>

    <!-- Long-press hint -->
    <p class="hint-text">左滑或长按玩家卡片可删除</p>

    <!-- Bottom spacer so content isn't hidden behind floating bar -->
    <div style="height:88px"></div>

</div>

<!-- ── Floating bottom bar ── -->
<div class="float-bar" id="float-bar">
    <div class="float-bar-inner">
        <div class="float-bar-pnl">
            <span class="float-bar-label">总盈亏</span>
            <span class="float-bar-value" id="total-pnl">— 分</span>
            <span class="balance-tag hidden" id="balance-tag"></span>
        </div>
        <button class="btn-export" id="btn-export" disabled style="opacity:0.4;cursor:not-allowed;box-shadow:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            导出结果
        </button>
    </div>
</div>


<!-- ── Chip input half-sheet ── -->
<div id="chip-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="chip-modal-header" id="chip-modal-header">
            <!-- avatar + name rendered by JS -->
        </div>
        <div id="chip-modal-body">
            <!-- steppers rendered by JS -->
        </div>
        <button class="btn btn-primary" id="btn-chip-done">完成</button>
    </div>
</div>

<!-- ── Avatar picker half-sheet ── -->
<div id="avatar-modal" class="modal-overlay hidden">
    <div class="modal-sheet avatar-modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div style="display:flex;align-items:center;gap:8px">
                <span>选择头像</span>
                <span class="editing-tag hidden" id="avatar-modal-editing-tag">有人录入中</span>
            </div>
            <button class="btn-icon" id="btn-close-modal">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="avatar-grid" id="modal-avatar-grid"></div>
    </div>
</div>

<!-- ── Name edit half-sheet ── -->
<div id="name-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div style="display:flex;align-items:center;gap:8px">
                <span>编辑名字</span>
                <span class="editing-tag hidden" id="name-modal-editing-tag">有人录入中</span>
            </div>
            <button class="btn-icon" id="btn-close-name-modal">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <input type="text" id="name-modal-input" class="input-field" maxlength="10" autocomplete="off" style="margin-bottom:14px">
        <button class="btn btn-primary" id="btn-save-name">保存</button>
    </div>
</div>

<!-- ── Delete confirm half-sheet ── -->
<div id="delete-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <p id="delete-modal-text" style="font-size:16px;font-weight:600;color:var(--clr-text);margin-bottom:6px;text-align:center"></p>
        <p style="font-size:13px;color:var(--clr-text-3);margin-bottom:20px;text-align:center">该玩家的筹码数据将被清除</p>
        <button class="btn btn-danger" id="btn-delete-confirm" style="margin-bottom:8px">确认删除</button>
        <button class="btn btn-ghost" id="btn-delete-cancel">取消</button>
    </div>
</div>

<!-- ── Reset confirm half-sheet ── -->
<div id="reset-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header"><span>重置游戏</span></div>
        <button class="btn btn-secondary" id="btn-reset-soft-confirm" style="margin-bottom:8px">重置筹码（保留名字和头像）</button>
        <button class="btn btn-danger" id="btn-reset-hard" style="margin-bottom:8px">完全重置（清空所有数据）</button>
        <button class="btn btn-ghost" id="btn-cancel-reset">取消</button>
    </div>
</div>

<!-- ── Avatar action sheet ── -->
<div id="avatar-action-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <button class="btn btn-secondary" id="btn-avatar-reupload" style="margin-bottom:8px">重新上传照片</button>
        <button class="btn btn-danger" id="btn-avatar-delete" style="margin-bottom:8px">删除照片</button>
        <button class="btn btn-ghost" id="btn-avatar-action-cancel">取消</button>
    </div>
</div>

<!-- ── Export modal ── -->
<div id="export-modal" class="modal-overlay hidden">
    <div class="modal-sheet export-modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <span>导出结算结果</span>
            <button class="btn-icon" id="btn-close-export">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="export-modal-body">
            <!-- The card to be captured as image -->
            <div id="export-card">
                <div class="export-card-header">
                    <div class="export-card-logo">
                        <img src="img/paw.png" alt="猫爪">
                        猫店德州结算
                    </div>
                    <div class="export-card-date" id="export-date"></div>
                </div>
                <div id="export-table-wrap"></div>
                <div id="export-badge"></div>
            </div>
            <p class="export-hint">长按图片保存到相册</p>
            <img id="export-image" style="display:none;width:100%;border-radius:12px" alt="结算结果">
        </div>
        <div class="export-modal-footer">
            <button class="btn btn-primary" id="btn-generate-img">生成图片</button>
        </div>
    </div>
</div>

<input type="file" id="avatar-upload-input" accept="image/*" style="display:none" aria-hidden="true">
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="js/firebase-config.js?v=18"></script>
<script src="js/avatars.js?v=18"></script>
<script src="js/settlement.js?v=18"></script>
<script src="js/app.js?v=18"></script>
</body>
</html>
