<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>猫店德州结算</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="app-header">
        <div class="app-title">
            <div class="app-title-icon">
                <!-- Minimal line-art cat face -->
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                    <!-- ears -->
                    <path d="M6.5 9 L5 4 L9 7.5"/>
                    <path d="M17.5 9 L19 4 L15 7.5"/>
                    <!-- head -->
                    <circle cx="12" cy="13" r="6.5"/>
                    <!-- eyes -->
                    <circle cx="9.8" cy="12" r=".9" fill="white" stroke="none"/>
                    <circle cx="14.2" cy="12" r=".9" fill="white" stroke="none"/>
                    <!-- nose -->
                    <path d="M11.3 14.2 L12 14.8 L12.7 14.2" stroke-width="1.2"/>
                    <!-- mouth -->
                    <path d="M10.5 15.4 Q12 16.4 13.5 15.4" stroke-width="1.2"/>
                </svg>
            </div>
            <div>
                <div class="app-title-text">猫店德州结算</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-icon" id="btn-reset-soft" title="重置">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Player list -->
    <div id="player-list"></div>

    <!-- Add player -->
    <button class="btn-add-player" id="btn-add-player">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        添加玩家
    </button>

    <!-- Long-press hint -->
    <p class="hint-text">左滑或长按玩家卡片可删除</p>

    <!-- Bottom spacer so content isn't hidden behind floating bar -->
    <div style="height:88px"></div>

</div>

<!-- ── Floating bottom bar ── -->
<div class="float-bar" id="float-bar">
    <div class="float-bar-inner">
        <div class="float-bar-pnl">
            <span class="float-bar-label">总盈亏</span>
            <span class="float-bar-value" id="total-pnl">— 分</span>
            <span class="float-bar-badge balance-ok hidden" id="balance-indicator">持平 ✓</span>
        </div>
        <button class="btn-export" id="btn-export">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            导出结果
        </button>
    </div>
</div>


<!-- ── Chip input half-sheet ── -->
<div id="chip-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="chip-modal-header" id="chip-modal-header">
            <!-- avatar + name rendered by JS -->
        </div>
        <div id="chip-modal-body">
            <!-- steppers rendered by JS -->
        </div>
        <button class="btn btn-primary" id="btn-chip-done">完成</button>
    </div>
</div>

<!-- ── Avatar picker half-sheet ── -->
<div id="avatar-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <span>选择头像</span>
            <button class="btn-icon" id="btn-close-modal">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="avatar-grid" id="modal-avatar-grid"></div>
    </div>
</div>

<!-- ── Name edit half-sheet ── -->
<div id="name-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <span>编辑名字</span>
            <button class="btn-icon" id="btn-close-name-modal">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <input type="text" id="name-modal-input" class="input-field" maxlength="10" autocomplete="off" style="margin-bottom:14px">
        <button class="btn btn-primary" id="btn-save-name">保存</button>
    </div>
</div>

<!-- ── Delete confirm half-sheet ── -->
<div id="delete-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <p id="delete-modal-text" style="font-size:16px;font-weight:600;color:var(--clr-text);margin-bottom:6px;text-align:center"></p>
        <p style="font-size:13px;color:var(--clr-text-3);margin-bottom:20px;text-align:center">该玩家的筹码数据将被清除</p>
        <button class="btn btn-danger" id="btn-delete-confirm" style="margin-bottom:10px">确认删除</button>
        <button class="btn btn-secondary btn-sm" id="btn-delete-cancel">取消</button>
    </div>
</div>

<!-- ── Reset confirm half-sheet ── -->
<div id="reset-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header"><span>重置游戏</span></div>
        <button class="btn btn-secondary" id="btn-reset-soft-confirm" style="margin-bottom:10px">重置筹码（保留名字和头像）</button>
        <button class="btn btn-danger" id="btn-reset-hard" style="margin-bottom:14px">完全重置（清空所有数据）</button>
        <button class="btn btn-secondary btn-sm" id="btn-cancel-reset">取消</button>
    </div>
</div>

<!-- ── Export modal ── -->
<div id="export-modal" class="modal-overlay hidden">
    <div class="modal-sheet export-modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <span>导出结算结果</span>
            <button class="btn-icon" id="btn-close-export">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <!-- The card to be captured as image -->
        <div id="export-card">
            <div class="export-card-header">
                <div class="export-card-logo">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M4 10 Q4 4 8 3 L8 8 Q10 6 12 6 Q14 6 16 8 L16 3 Q20 4 20 10 Q20 16 12 20 Q4 16 4 10Z" fill="white" opacity=".9"/>
                        <path d="M8 3 L8 1 L10 3Z" fill="white"/>
                        <path d="M16 3 L14 1 L16 3Z" fill="white"/>
                        <path d="M12 12 Q10 10 10 9 Q10 7.5 12 7.5 Q14 7.5 14 9 Q14 10 12 12Z" fill="#107C10"/>
                        <rect x="11" y="12" width="2" height="2" fill="#107C10"/>
                        <rect x="10" y="14" width="4" height="1" fill="#107C10"/>
                    </svg>
                    猫店德州结算
                </div>
                <div class="export-card-date" id="export-date"></div>
            </div>
            <div id="export-table-wrap"></div>
            <div id="export-badge"></div>
        </div>
        <p class="export-hint">长按图片保存到相册</p>
        <img id="export-image" style="display:none;width:100%;border-radius:12px;margin-bottom:12px" alt="结算结果">
        <button class="btn btn-primary" id="btn-generate-img">生成图片</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/avatars.js"></script>
<script src="js/settlement.js"></script>
<script src="js/app.js"></script>
</body>
</html>
